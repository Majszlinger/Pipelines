name: Lint and Unit Test

on:
  workflow_call:
    inputs:
      base-dir:
        required: false
        type: string
        default: .
    # secrets:
      # Add secrets if needed

jobs:
  lint-unit-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:8
        ports: [27017:27017]
        options: >-
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ inputs.base-dir }}
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint code
        run: |
          cd ${{ inputs.base-dir }}
          flake8 .

      - name: Run unit tests (excluding integration)
        run: |
          cd ${{ inputs.base-dir }}
          pytest --cov=. --cov-report=xml --cov-report=term --ignore=tests/integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ${{ inputs.base-dir }}/coverage.xml