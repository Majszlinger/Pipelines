name: Full backend Docker Pipeline

on:
    workflow_call:
        inputs:
            image-name:
                required: false
                type: string
                default: "${{ github.event.repository.name }}-backend"
            base-dir:
                required: false
                type: string
                default: .
            deployment-name:
                required: true
                type: string
            pod-name:
                required: true
                type: string
            namespace:
                required: true
                type: string

        secrets:
            # DOCKERHUB_USERNAME:
            #     required: true
            DOCKERHUB_TOKEN:
                required: true
            KUBE_CONFIG:
                required: true
            DEPLOY_KEY:
                required: false

jobs:

    lint-unit-test:
        uses: ./.github/workflows/py-unit-test.yml
        with:
            base-dir: ${{ inputs.base-dir }}

    build-and-push:
        if: github.event_name == 'release' && github.event.action == 'published'
        needs: lint-unit-test
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit
        with:
            image-name: ${{ inputs.image-name }}
            base-dir: ${{ inputs.base-dir }}


    kube-deploy:
        if: github.event_name == 'release' && github.event.action == 'published'
        needs: build-and-push
        uses: ./.github/workflows/kube-deploy.yml
        secrets: inherit
        with:
            tags: ${{ needs.build-and-push.outputs.tags }}
            deployment-name: ${{ inputs.deployment-name }}
            pod-name: ${{ inputs.pod-name }}
            namespace: ${{ inputs.namespace }}
